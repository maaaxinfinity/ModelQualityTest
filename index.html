<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Model Quality Test</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://fontsapi.zeoseven.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300..700;1,400&display=swap" rel="stylesheet" />
  <link href="https://fontsapi.zeoseven.com/165/main/result.css" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%2064%2064%27%3E%3Crect%20width=%2764%27%20height=%2764%27%20rx=%2714%27%20fill=%27%230d0d0d%27/%3E%3Cg%20fill=%27%23ffffff%27%20transform=%27translate%2810%2019.2%29%20scale%280.2596%29%27%3E%3Cpath%20d=%27m146.3%2096h18.7l-31.6-31h-19.2l16.9%2015.8c-3.6%201.1-7%202.3-12.2%202.3-16.9%200-33.8-11.7-33.8-33.5%200-1.5%200.2-3.6%200.3-5.2l-12%2014c4.1%2021.3%2021.6%2037.6%2045.5%2037.6%207.8%200%2015-1.5%2022.6-5.4l6.2%205.4z%27/%3E%3Cpath%20d=%27m119.3%202.7c-11.2%200-22.9%203.8-32.1%2012.3l-32.9%2037.8-40.5-47.7h-10.4v90.9h12.9v-65.2l38%2041.5%2039.4-45.3c5.4-6.2%2013.3-11.9%2025.6-11.9%2017.1%200%2034.3%2012.8%2034.3%2034%200%206.6-2.3%2014.2-7.3%2020.5l9.3%209.1c6.2-7.6%2010.6-17.6%2010.6-29.4%200-24.2-18.7-46.6-46.9-46.6z%27/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css?v=19" />
</head>
<body class="app-locked">

  <!-- ───────────────────────── Auth screen (locked) ───────────────────────── -->
  <main class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="auth-logo">
          <svg class="brand-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 169.5 98.7" fill="currentColor" role="img" aria-label="Model Quality">
            <path d="m146.3 96h18.7l-31.6-31h-19.2l16.9 15.8c-3.6 1.1-7 2.3-12.2 2.3-16.9 0-33.8-11.7-33.8-33.5 0-1.5 0.2-3.6 0.3-5.2l-12 14c4.1 21.3 21.6 37.6 45.5 37.6 7.8 0 15-1.5 22.6-5.4l6.2 5.4z"/>
            <path d="m119.3 2.7c-11.2 0-22.9 3.8-32.1 12.3l-32.9 37.8-40.5-47.7h-10.4v90.9h12.9v-65.2l38 41.5 39.4-45.3c5.4-6.2 13.3-11.9 25.6-11.9 17.1 0 34.3 12.8 34.3 34 0 6.6-2.3 14.2-7.3 20.5l9.3 9.1c6.2-7.6 10.6-17.6 10.6-29.4 0-24.2-18.7-46.6-46.9-46.6z"/>
          </svg>
        </span>
        <div class="auth-brand-text">
          <div class="auth-brand-name">Model Quality Test</div>
          <div class="auth-brand-sub">multi-provider quality &amp; channel probe</div>
        </div>
      </div>
      <div class="auth-flow" id="auth-flow"></div>
      <div class="log-box" id="auth-output"></div>
      <div class="auth-foot" id="auth-foot"><span class="dot"></span>连接中…</div>
    </div>
  </main>

  <!-- ───────────────────────── App shell (authed) ───────────────────────── -->
  <div class="shell" id="shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-mark">
          <svg class="brand-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 169.5 98.7" fill="currentColor" role="img" aria-label="Model Quality">
            <path d="m146.3 96h18.7l-31.6-31h-19.2l16.9 15.8c-3.6 1.1-7 2.3-12.2 2.3-16.9 0-33.8-11.7-33.8-33.5 0-1.5 0.2-3.6 0.3-5.2l-12 14c4.1 21.3 21.6 37.6 45.5 37.6 7.8 0 15-1.5 22.6-5.4l6.2 5.4z"/>
            <path d="m119.3 2.7c-11.2 0-22.9 3.8-32.1 12.3l-32.9 37.8-40.5-47.7h-10.4v90.9h12.9v-65.2l38 41.5 39.4-45.3c5.4-6.2 13.3-11.9 25.6-11.9 17.1 0 34.3 12.8 34.3 34 0 6.6-2.3 14.2-7.3 20.5l9.3 9.1c6.2-7.6 10.6-17.6 10.6-29.4 0-24.2-18.7-46.6-46.9-46.6z"/>
          </svg>
        </span>
        <span class="brand-name">Model Quality</span>
      </div>

      <div class="nav-section">
        <div class="nav-label">Testing</div>
        <nav class="nav" id="group-nav" aria-label="模型分组"></nav>
      </div>

      <div class="nav-section" id="platform-section" hidden>
        <div class="nav-label">Platform</div>
        <nav class="nav" id="platform-nav" aria-label="平台">
          <button type="button" class="nav-item" data-view="endpoints">
            <span class="nav-ico">⚙</span><span>端点管理</span></button>
          <button type="button" class="nav-item" data-view="history">
            <span class="nav-ico">◷</span><span>测试历史</span></button>
          <button type="button" class="nav-item" data-view="admin">
            <span class="nav-ico">◆</span><span>管理</span></button>
        </nav>
      </div>

      <div class="sidebar-foot">
        <button class="nav-item subtle" id="theme-toggle" type="button">
          <span class="nav-ico" id="theme-ico">☾</span><span>主题</span>
        </button>
        <div class="account" id="account-chip" hidden></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="workspace">
      <header class="page-head">
        <div class="page-head-text">
          <h1 id="page-title">OpenAI</h1>
          <p id="page-desc">配置并运行该分组下的模型质量探测用例。</p>
        </div>
      </header>

      <!-- session panel (2FA rotation / warnings) is injected here by app.js -->

      <!-- ============ View: Test ============ -->
      <div class="view active" id="view-test">
        <div class="endpoint-picker" id="endpoint-picker"></div>

        <section class="runbar" id="runbar">
          <div class="runbar-main">
            <button class="primary" id="run-all" type="button">运行全部</button>
            <button id="stop" type="button" disabled>停止</button>
            <button id="clear-results" type="button">清空</button>
            <button id="export-results" type="button">导出 JSON</button>
          </div>
          <div class="runbar-opts">
            <label class="mini-field" title="并发数"><span>并发</span>
              <input type="number" id="opt-concurrency" min="1" max="20" value="2" /></label>
            <span class="run-status" id="run-status">就绪</span>
          </div>
          <div class="runbar-progress" id="run-progress" hidden><i id="run-progress-bar"></i></div>
        </section>

        <section class="block tests-block">
          <div class="tests-head">
            <h2>Tests <span class="count" id="q-count">0</span></h2>
            <div class="tests-actions">
              <select id="filter-category" aria-label="分类筛选">
                <option value="">全部分类</option>
              </select>
            </div>
          </div>
          <div class="qgrid" id="qgrid"></div>
        </section>
      </div>

      <!-- ============ View: Endpoints ============ -->
      <div class="view" id="view-endpoints">
        <section class="block config-block">
          <div class="block-head">
            <h2>端点配置 <span class="muted" id="endpoints-summary"></span></h2>
            <div class="block-actions">
              <button id="delete-endpoint" type="button" hidden>删除</button>
              <button id="sync-models" type="button" hidden>同步模型</button>
              <button id="detect-models" type="button">检测模型列表</button>
              <button class="primary" id="save-endpoint" type="button" disabled>保存</button>
            </div>
          </div>
          <div class="block-body">
            <div class="ep-group-tabs" id="ep-group-tabs"></div>
            <div class="ep-endpoint-list" id="ep-endpoint-list"></div>
            <div class="models-title">启用模型</div>
            <div class="endpoints-models" id="endpoints-models"></div>
            <div class="field-grid">
              <label class="field span-2">
                <span>端点名称</span>
                <input type="text" id="cfg-name" placeholder="例如 官方 / 代理A / Azure" spellcheck="false" />
              </label>

              <label class="field span-2">
                <span>Base URL</span>
                <input type="text" id="cfg-baseUrl" spellcheck="false" />
              </label>

              <label class="field span-2">
                <span>API Key</span>
                <input type="password" id="cfg-apiKey" autocomplete="off" placeholder="sk-…" spellcheck="false" />
              </label>

              <label class="field span-2">
                <span>Authorization</span>
                <select id="cfg-authMode">
                  <option value="bearer">Authorization: Bearer</option>
                  <option value="x-api-key">x-api-key</option>
                  <option value="both">both</option>
                </select>
              </label>

              <label class="field">
                <span>Max tokens</span>
                <input type="number" id="cfg-maxTokens" value="102400" min="16" max="200000" />
              </label>

              <label class="field">
                <span>Timeout (ms)</span>
                <input type="number" id="cfg-timeout" value="600000" min="1000" max="900000" />
              </label>

              <label class="field">
                <span>Delay (ms)</span>
                <input type="number" id="cfg-delay" value="300" min="0" max="10000" />
              </label>

              <label class="field image-only">
                <span>Image n</span>
                <input type="number" id="cfg-image-n" value="1" min="1" max="10" />
              </label>

              <label class="field image-only">
                <span>Image quality</span>
                <select id="cfg-image-quality">
                  <option value="low">low</option>
                  <option value="medium" selected>medium</option>
                  <option value="high">high</option>
                </select>
              </label>

              <label class="field image-only">
                <span>Image size</span>
                <input type="text" id="cfg-image-size" value="1024x1024" spellcheck="false" />
              </label>

              <label class="field span-full">
                <span>System prompt</span>
                <textarea id="cfg-system" rows="2" placeholder="留空则不发送 system"></textarea>
              </label>
            </div>
            <div class="log-box" id="endpoints-output"></div>
          </div>
        </section>
      </div>

      <!-- ============ View: History ============ -->
      <div class="view" id="view-history">
        <section class="block">
          <div class="block-head">
            <h2>测试历史</h2>
            <div class="block-actions">
              <select id="history-group" aria-label="分组筛选">
                <option value="">全部分组</option>
              </select>
              <button id="refresh-logs" type="button">刷新</button>
              <button id="export-logs" type="button">导出 CSV</button>
            </div>
          </div>
          <div class="log-box" id="history-output"></div>
        </section>
      </div>

      <!-- ============ View: Admin ============ -->
      <div class="view" id="view-admin">
        <section class="block">
          <div class="block-head">
            <h2>管理</h2>
            <div class="block-actions">
              <button id="create-invite" type="button">生成邀请码</button>
              <button id="system-status" type="button">系统状态</button>
              <button id="sync-prices" type="button">同步价格</button>
            </div>
          </div>
          <div class="log-box" id="admin-output"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Right-side detail drawer: full request/response/headers for a probe -->
  <div class="drawer-scrim" id="drawer-scrim"></div>
  <aside class="drawer" id="drawer" aria-label="详情">
    <div class="drawer-head">
      <span class="drawer-title" id="drawer-title"></span>
      <button type="button" class="drawer-close" id="drawer-close" aria-label="关闭">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>

  <script src="questions.js?v=6"></script>
  <script src="qrbtf.bundle.js?v=1"></script>
  <script src="app.js?v=28"></script>
</body>
</html>
